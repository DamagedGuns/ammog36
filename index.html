<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture Vidéo</title>
    <style>
        body {
            margin: 0;
            background-color: #000; /* Fond noir pour un look cinéma */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Centre la vidéo verticalement */
            overflow: hidden; /* Empêche le défilement si inutile */
        }

        video {
            
            max-width: 90%;    /* La vidéo prend 90% de la largeur max */
            max-height: 90vh;  /* Ou 90% de la hauteur de l'écran */
            box-shadow: 0 0 20px rgba(255,255,255,0.2); /* Petit effet de contour */
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <video controls width="100%">
    <source src="ammoG36.mp4" type="video/mp4">
    Votre navigateur ne supporte pas la lecture de vidéos.
</video>

</body>
</html>
